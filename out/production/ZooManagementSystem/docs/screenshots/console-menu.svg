  <text x="56" y="116" font-family="Menlo, Consolas, monospace" font-size="17" fill="#d6dde5">1) Show The Zoo Details and Number of pets in it</text>
  <text x="56" y="146" font-family="Menlo, Consolas, monospace" font-size="17" fill="#d6dde5">2) Show all Penguins in the zoo</text>
