  <text x="56" y="206" font-family="Menlo, Consolas, monospace" font-size="17" fill="#d6dde5">4) Show all the carnivorous animals</text>
  <text x="56" y="236" font-family="Menlo, Consolas, monospace" font-size="17" fill="#d6dde5">5) Add a new carnivorous animal</text>
